  join: "&a{player} &7joined &b{arena} &7(&e{current}&7/&e{max}&7)"
  leave: "&c{player} &7left &b{arena} &7(&e{current}&7/&e{max}&7)"
  countdown-start: "&7Enough players! Starting in &e{seconds} &7seconds..."
  countdown-tick: "&7Game starting in &e{seconds}&7..."
  game-start: "&a&lThe game has begun! &7Random loot will rain down every &e{interval} &7seconds!"
  loot-received: "&7You received: &b{item}"
  eliminated: "&c&lYou were eliminated! &7Better luck next time."
  eliminated-void: "&c&lYou fell off the map and were eliminated!"
  player-eliminated-broadcast: "&c{player} &7has been eliminated! &7(&e{remaining} &7remaining)"
  player-died-spectator: "&c{player} &7died and is now spectating. &7(&e{remaining} &7still alive)"
  spectator-mode: "&7You are now in spectator mode. Watch the remaining players fight!"
  spectator-kicked-region: "&cYou left the arena region as a spectator and were kicked from the game."
  win: "&6&l{player} &e&lwon the game!"
