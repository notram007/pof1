# ===================================================
#  Pillars of Fortune - Configuration (Multi-Arena)
# ===================================================
# These are GLOBAL DEFAULTS applied to every arena.
# Per-arena overrides (lobby, map-center, pillars, signs) are stored
# automatically in plugins/PillarsOfFortune/arenas/<name>.yml
# when you use /pof arena setlobby, /pof setpillar, etc.

game:
  # Minimum players required before the countdown begins
  min-players: 2
  # Maximum players allowed in a single arena (should be <= number of registered pillars)
  max-players: 16
  # Countdown (in seconds) once min-players is reached, before the game starts
  countdown-seconds: 15
  # How often (in seconds) every alive player receives a random item
  loot-interval-seconds: 5
  # How many items are given per loot drop (each drop is 1 item)
  items-per-drop: 1
  # Maximum game duration in seconds before it force-ends (last alive player(s) win). 0 = no limit.
  max-duration-seconds: 300
  # Y-level below which a player is treated as "still alive" even if they fell off their pillar.
  # Falling does NOT eliminate players in this version - only death does.
  # Players who fall are healed of fall damage automatically.
  cancel-fall-damage: true
  # If a player ends up further than this many blocks (horizontal distance) from
  # the arena's map center, they are automatically eliminated and sent back to that
  # arena's lobby. This is NOT about falling - falling alone never eliminates anyone.
  map-radius: 60.0
  # Safety net: if a player's Y-coordinate drops below this value (e.g. fell into the void,
  # or got teleported somewhere broken), they are automatically eliminated and sent back to
  # the lobby instead of lingering off-map with loot still trying to drop on them.
  void-y-level: -10

